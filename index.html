<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcas de Carros - Listagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark" aria-label="offcanvas navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🚗 Marcas de Carros</span>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <div class="col-lg-10 offset-lg-1">
                <h1 class="mb-4 text-center">Listagem de Marcas de Carros</h1>

                <!-- Feedback de carregamento -->
                <div id="loading" class="alert alert-info text-center" role="alert">
                    <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
                    Carregando dados...
                </div>

                <!-- Mensagem de erro -->
                <div id="error" class="alert alert-danger d-none" role="alert">
                    <strong>Erro ao carregar!</strong> <span id="error-message"></span>
                </div>

                <!-- Lista de marcas -->
                <div id="content" class="d-none">
                    <div class="row" id="carsContainer">
                        <!-- Cards serão inseridos aqui pelo JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 - Aplicação de Listagem de Carros. Desenvolvido com HTML, Bootstrap e JavaScript.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
